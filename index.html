<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-wrapper">
        <h1 class="game-title">Water Drop</h1>
        <p class="game-tagline">Catch the good drops, avoid the bad ones!</p>
        <div class="score-panel">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer">Time: <span id="time">30</span>s</div>
            <button id="start-btn">Start Game</button>
        </div>
        
        <div id="game-container">
        </div>
    </div>

    <div id="result-modal" class="result-modal hidden" role="dialog" aria-modal="true" aria-labelledby="result-title">
        <div class="result-card">
            <h2 id="result-title" class="result-title">Game Over</h2>
            <p id="result-message" class="result-message"></p>
            <button id="play-again-btn" class="play-again-btn">Play Again</button>
            <div id="confetti-container" class="confetti-container" aria-hidden="true"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
